<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alqoritmlər Meseleler— 41 Məsələ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d1117;--panel:#151b24;--panel2:#1b2330;--border:#283242;
  --ink:#e6edf3;--muted:#8b96a5;--grid:#171e29;
  --teal:#2dd4bf;--tealdim:#0f3d39;--amber:#f5a623;--amberdim:#3d2f10;
  --red:#f0716e;--reddim:#3c1d1d;--blue:#60a5fa;--bluedim:#1e3a5f;
  --purple:#c084fc;--purpledim:#3b1f5e;
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);line-height:1.55;-webkit-font-smoothing:antialiased;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:28px 28px;display:flex;min-height:100vh}
/* ---- Sidebar ---- */
#sidebar{width:268px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);height:100vh;overflow-y:auto;position:sticky;top:0}
.sb-hd{padding:16px 14px 10px;border-bottom:1px solid var(--border)}
.sb-hd h1{font-family:var(--disp);font-size:14px;font-weight:700;color:var(--teal)}
.sb-hd p{font-size:11px;color:var(--muted);margin-top:3px}
.sb-cat{padding:8px 14px 2px;font-family:var(--disp);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.sb-item{display:flex;align-items:flex-start;gap:9px;padding:7px 14px;cursor:pointer;font-size:12.5px;transition:background .12s;border-left:2px solid transparent;line-height:1.35}
.sb-item:hover{background:var(--panel2)}
.sb-item.active{background:var(--panel2);border-left-color:var(--teal);color:var(--teal)}
.sb-num{min-width:22px;height:22px;border-radius:5px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px}
.sb-item.active .sb-num{border-color:var(--teal);color:var(--teal)}
.sb-txt{color:var(--muted)}
.sb-item.active .sb-txt{color:var(--teal)}
/* ---- Main ---- */
#main{flex:1;padding:18px;overflow-y:auto;min-width:0}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.card-h{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-family:var(--disp);font-size:12.5px;color:var(--muted)}
.card-h b{color:var(--ink);font-weight:500}
/* ---- Algo def ---- */
.algo-def-inner{padding:14px 15px}
.algo-def-inner h2{font-family:var(--disp);font-size:17px;font-weight:700;display:flex;align-items:center;gap:9px;margin-bottom:7px}
.algo-def-inner h2::before{content:"";width:4px;height:17px;background:var(--teal);border-radius:2px;flex-shrink:0}
.algo-def-inner .question{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:9px;padding:10px 13px;font-size:13.5px;margin-bottom:10px;color:var(--ink)}
.algo-def-inner .definition{font-size:13.5px;color:var(--muted);margin-bottom:10px}
.badges{display:flex;gap:7px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--panel2);color:var(--muted)}
.badge.t{border-color:var(--teal);color:var(--teal)}
.badge.a{border-color:var(--amber);color:var(--amber)}
.badge.r{border-color:var(--red);color:var(--red)}
/* ---- Stage ---- */
.stage{display:grid;grid-template-columns:1.45fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:860px){.stage{grid-template-columns:1fr}}
/* ---- Bar chart ---- */
.bar-wrap{padding:14px 10px 6px;background:radial-gradient(circle at 30% 20%,#121a26,#0d1117 70%)}
.bar-group{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:210px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:64px}
.bar-val{font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap}
.bar-rect{width:100%;border-radius:4px 4px 0 0;background:#3a4658;transition:height .22s,background .18s;min-height:6px}
.bar-rect.cmp{background:var(--amber)}
.bar-rect.sorted{background:var(--teal)}
.bar-rect.minv{background:var(--red)}
.bar-rect.pivot{background:var(--purple)}
.bar-rect.keyv{background:var(--blue)}
.bar-rect.lhalf{background:#3b5bc0}
.bar-rect.rhalf{background:#7c3aed}
.bar-rect.swp{background:var(--amber);filter:brightness(1.4);box-shadow:0 0 10px rgba(245,166,35,.5)}
.bar-rect.placed{background:var(--blue);box-shadow:0 0 8px rgba(96,165,250,.5)}
.bar-idx{font-family:var(--mono);font-size:9px;color:#4a5568}
/* ---- Bar legend ---- */
.bar-legend{display:flex;gap:10px;flex-wrap:wrap;padding:6px 10px 8px;border-top:1px solid var(--border);background:var(--panel)}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--disp);font-size:10.5px;color:var(--muted)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.leg-dot.cmp{background:var(--amber)}
.leg-dot.sorted{background:var(--teal)}
.leg-dot.pivot{background:var(--purple)}
.leg-dot.keyv{background:var(--blue)}
.leg-dot.minv{background:var(--red)}
.leg-dot.lhalf{background:#3b5bc0}
.leg-dot.rhalf{background:#7c3aed}
.leg-dot.placed{background:var(--blue)}
/* ---- Compare ---- */
.cmp-wrap{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--panel2)}
.cmp-side{background:var(--panel)}
.cmp-label{text-align:center;padding:6px 0 0;font-family:var(--disp);font-size:11px;font-weight:700;color:var(--muted)}
.cmp-stats{display:flex;gap:6px;justify-content:center;padding:6px 0 10px;flex-wrap:wrap}
.cmp-stat{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
.cmp-stat.better{border-color:var(--teal);color:var(--teal)}
/* ---- Graph SVG ---- */
svg.gviz{display:block;width:100%;height:auto;background:radial-gradient(circle at 30% 20%,#121a26,#0d1117 70%);min-height:200px}
.gedge{stroke:#3f4b5b;stroke-width:2.5;transition:stroke .3s,stroke-width .3s}
.gedge.tree{stroke:var(--teal);stroke-width:5}
.gedge.consider{stroke:var(--amber);stroke-width:5;stroke-dasharray:7 5;animation:dash 1s linear infinite}
.gedge.reject{stroke:var(--red);stroke-width:4;stroke-dasharray:3 5;opacity:.85}
@keyframes dash{to{stroke-dashoffset:-24}}
@media(prefers-reduced-motion:reduce){.gedge.consider{animation:none}}
.wbadge rect{rx:5}
.wbadge text{font-family:var(--mono);font-size:12px;font-weight:500;fill:#9aa6b6;text-anchor:middle;dominant-baseline:central}
.wbadge.hot text{fill:var(--amber)}
.wbadge.on text{fill:var(--teal)}
.gnode circle{fill:#222b39;stroke:#3a4658;stroke-width:2.5;transition:.3s}
.gnode text.lbl{font-family:var(--disp);font-weight:700;font-size:16px;fill:var(--ink);text-anchor:middle;dominant-baseline:central}
.gnode text.dlbl{font-family:var(--mono);font-size:11px;font-weight:700;fill:var(--amber);text-anchor:middle}
.gnode.in circle{fill:var(--tealdim);stroke:var(--teal);stroke-width:3}
.gnode.cur circle{fill:var(--amberdim);stroke:var(--amber);stroke-width:3.5}
/* ---- Controls ---- */
.controls{display:flex;gap:7px;padding:11px 14px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap}
button.ctl{font-family:var(--disp);font-size:12.5px;font-weight:500;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--ink);padding:8px 13px;border-radius:8px;transition:.14s}
button.ctl:hover:not(:disabled){border-color:var(--teal);color:var(--teal)}
button.ctl:disabled{opacity:.32;cursor:not-allowed}
button.ctl.primary{background:var(--teal);color:#08221f;border-color:var(--teal);font-weight:700}
button.ctl.primary:hover{filter:brightness(1.08);color:#08221f}
.step-ctr{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--muted)}
.prog-bar{height:3px;background:var(--panel2)}
.prog-bar i{display:block;height:100%;background:var(--teal);transition:width .3s}
/* ---- Side panel ---- */
.desc-panel{padding:13px 14px;min-height:90px;font-size:13.5px}
.step-title{font-family:var(--disp);font-weight:700;color:var(--teal);font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.desc-panel b{font-weight:600}
.desc-panel code{font-family:var(--mono);font-size:11.5px;background:rgba(45,212,191,.08);color:var(--teal);padding:1px 5px;border-radius:4px;border:1px solid rgba(45,212,191,.2)}
.state-panel{padding:11px 14px;border-top:1px solid var(--border);font-family:var(--mono);font-size:12px}
.slbl{color:var(--muted);font-family:var(--disp);font-size:10px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;margin-top:10px}
.slbl:first-child{margin-top:0}
.srow{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-radius:6px;margin-bottom:2px;background:var(--panel2)}
.srow.pick{background:var(--amberdim);color:var(--amber)}
.srow.done{background:var(--tealdim);color:var(--teal)}
.srow.rej{color:var(--red);text-decoration:line-through;opacity:.7}
.sbadge{font-size:10px;padding:1px 6px;border-radius:15px;border:1px solid currentColor;font-family:var(--disp)}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th,.dtbl td{padding:4px 7px;text-align:center;border-bottom:1px solid var(--border);font-size:11.5px}
.dtbl th{color:var(--muted);font-family:var(--disp);font-size:10px}
.dtbl tr.cur td{color:var(--amber);font-weight:700}
.dtbl tr.done td{color:var(--teal)}
/* ---- Complexity ---- */
.cx-view{padding:14px 15px}
.cx-code{background:#0a0e14;border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-family:var(--mono);font-size:12.5px;line-height:1.7;color:#cdd6e0;margin-bottom:12px;overflow-x:auto}
.cx-code .hl{background:rgba(245,166,35,.15);color:var(--amber);display:block;border-radius:3px;padding:0 3px;margin:0 -3px}
.cx-math{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;font-family:var(--mono);font-size:13px;line-height:1.9;color:#cdd6e0;margin-bottom:12px}
.cx-math .hl{color:var(--amber)}
.cx-math .res{color:var(--teal);font-weight:700;font-size:14px}
.cx-result{background:linear-gradient(135deg,var(--tealdim),var(--panel2));border:1px solid var(--teal);border-radius:10px;padding:13px 15px;text-align:center}
.cx-result .big{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--teal)}
.cx-result .sub{font-size:13px;color:var(--muted);margin-top:5px}
/* ---- Code ---- */
.code-tabs{display:flex;gap:6px;padding:10px 14px 0;flex-wrap:wrap}
.code-tab{font-family:var(--mono);font-size:11.5px;cursor:pointer;background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:7px;transition:.12s}
.code-tab.active{color:var(--teal);border-color:var(--teal)}
pre.code{background:#0a0e14;padding:10px 0;font-family:var(--mono);font-size:12.5px;line-height:1.75;color:#cdd6e0;overflow:auto;margin:0;border-top:1px solid var(--border);max-height:280px}
/* ---- Merge tree visual ---- */
.merge-info{padding:6px 10px;background:var(--panel2);border-top:1px solid var(--border);font-family:var(--mono);font-size:11.5px;color:var(--muted);text-align:center;min-height:28px}
/* ---- Code line highlight ---- */
.code-line{display:flex;align-items:baseline;gap:0;transition:background .18s;padding:1px 14px 1px 0}
.code-line .ln{min-width:34px;text-align:right;padding-right:14px;color:#3d4f63;font-size:11px;user-select:none;flex-shrink:0;border-right:1px solid #1e2a38}
.code-line .lc{flex:1;padding-left:12px;white-space:pre}
.code-line.active-line{background:rgba(45,212,191,.13)}
.code-line.active-line .ln{color:var(--teal);border-right-color:var(--teal)}
.code-line.active-line .lc{color:#fff;text-shadow:0 0 12px rgba(45,212,191,.35)}
/* ---- Bilingual question ---- */
.q-az{font-size:13.5px;color:var(--ink);margin-bottom:4px}
.q-en{font-size:12px;color:var(--muted);font-style:italic}
/* ---- 2x2 def grid ---- */
.def-grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:700px){.def-grid4{grid-template-columns:1fr}}
/* ---- Question block ---- */
.question-block{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:9px;padding:10px 13px;margin-bottom:10px}
.q-label{font-family:var(--disp);font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
/* ---- Def blocks ---- */
.def-block{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:11px 13px}
.def-block-label{font-family:var(--disp);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;display:block}
.lbl-teal{color:var(--teal)}
.lbl-blue{color:var(--blue)}
.lbl-purple{color:var(--purple)}
.lbl-amber{color:var(--amber)}
.def-text{font-size:12.5px;color:var(--muted);line-height:1.6}
/* ---- How list ---- */
.how-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:5px}
.how-list li{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:var(--muted);line-height:1.45}
.step-n{min-width:20px;height:20px;border-radius:50%;background:var(--teal);color:#08221f;font-family:var(--mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
/* ---- Loru block ---- */
.loru-block{background:linear-gradient(135deg,#1a2535,#151b24);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:9px;padding:11px 13px;margin-bottom:10px}
.loru-text{font-size:13px;color:var(--ink);line-height:1.65;font-style:italic}
/* ---- Graph 3-way compare ---- */
.gcmp{background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:10px}
.gcmp-title{font-family:var(--disp);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.gcmp-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
@media(max-width:500px){.gcmp-row{grid-template-columns:1fr}}
.gcmp-card{background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:10px 11px;border-top:2px solid var(--border)}
.gcmp-card.cur{border-top-color:var(--teal);background:#0f2922}
.gcmp-card.cur2{border-top-color:var(--teal);background:#0f2922}
.gcmp-card.dif{border-top-color:var(--amber);background:#1e1608}
.gcmp-name{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--ink);margin-bottom:4px}
.gcmp-card.cur .gcmp-name,.gcmp-card.cur2 .gcmp-name{color:var(--teal)}
.gcmp-card.dif .gcmp-name{color:var(--amber)}
.gcmp-goal{font-size:11.5px;color:var(--muted);line-height:1.5;margin-bottom:5px}
.gcmp-how{font-size:11px;color:var(--muted);font-style:italic;border-top:1px solid var(--border);padding-top:5px;margin-top:2px}
.gcmp-badge{display:inline-block;font-family:var(--disp);font-size:9px;font-weight:700;padding:1px 7px;border-radius:10px;margin-bottom:5px}
.gcmp-badge.mst{background:rgba(45,212,191,.12);color:var(--teal);border:1px solid rgba(45,212,191,.3)}
.gcmp-badge.sp{background:rgba(245,166,35,.12);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.gcmp-note{font-size:12px;color:var(--muted);line-height:1.55;padding-top:8px;border-top:1px solid var(--border)}
.gcmp-note b{color:var(--ink)}
/* ---- Complexity primer ---- */
.cx-primer{background:linear-gradient(135deg,#0f1e30,#0d1117);border:1px solid var(--border);border-top:2px solid var(--teal);border-radius:12px;padding:14px 15px;margin-bottom:12px}
.cxp-title{font-family:var(--disp);font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px;letter-spacing:.03em}
.cxp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.cxp-grid{grid-template-columns:1fr}}
.cxp-col{}
.cxp-sub{font-family:var(--disp);font-size:10px;font-weight:700;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.cxp-text{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:0}
.cxp-rules{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px}
.cxp-rules li{display:flex;align-items:flex-start;gap:7px;font-size:12px;color:var(--muted);line-height:1.45}
.cxp-rules code{font-family:var(--mono);font-size:11px;background:rgba(96,165,250,.1);color:var(--blue);padding:1px 5px;border-radius:3px}
.cxr-num{min-width:18px;height:18px;border-radius:50%;background:var(--blue);color:#0a0e14;font-family:var(--mono);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
/* ---- Big-O hierarchy ---- */
.cx-hier{display:flex;flex-direction:column;gap:3px;margin-top:4px}
.cxh-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;border-left:3px solid}
.cxh-1{background:rgba(45,212,191,.08);border-color:var(--teal)}
.cxh-2{background:rgba(96,165,250,.08);border-color:var(--blue)}
.cxh-3{background:rgba(45,212,191,.06);border-color:#2dd4bf99}
.cxh-4{background:rgba(192,132,252,.08);border-color:var(--purple)}
.cxh-5{background:rgba(245,166,35,.08);border-color:var(--amber)}
.cxh-6{background:rgba(240,113,110,.08);border-color:var(--red)}
.cxh-7{background:rgba(240,113,110,.12);border-color:#c0392b}
.cxh-o{font-family:var(--mono);font-size:11px;font-weight:700;min-width:82px;flex-shrink:0;color:var(--ink)}
.cxh-lbl{font-size:11px;color:var(--muted);line-height:1.3}
/* ---- Mobile hamburger ---- */
#menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--panel);border:1px solid var(--border);border-radius:9px;width:40px;height:40px;align-items:center;justify-content:center;cursor:pointer;flex-direction:column;gap:5px;padding:10px}
#menu-toggle span{display:block;height:2px;background:var(--ink);border-radius:2px;width:18px;transition:.2s}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;backdrop-filter:blur(2px)}
/* ---- Mobile layout ---- */
@media(max-width:720px){
  #menu-toggle{display:flex}
  body{flex-direction:column}
  #sidebar{position:fixed;top:0;left:-280px;height:100vh;width:268px;z-index:100;transition:left .22s ease;box-shadow:4px 0 24px #000a}
  #sidebar.open{left:0}
  #sidebar-overlay.open{display:block}
  #main{padding:56px 10px 10px;width:100%}
  .stage{grid-template-columns:1fr!important;gap:10px}
  .controls{gap:5px;padding:8px 10px}
  button.ctl{font-size:11.5px;padding:7px 10px}
  .algo-def-inner h2{font-size:15px}
  .card-h{font-size:11.5px}
  pre.code{font-size:11.5px}
  .bar-group{height:170px!important}
  .bar-val{font-size:9px}
  .step-ctr{font-size:10.5px}
  #prob-list{padding-bottom:40px}
}
@media(max-width:480px){
  button.ctl{font-size:10.5px;padding:6px 8px}
  .algo-def-inner h2{font-size:13.5px}
  .badges{gap:5px}
  .badge{font-size:10px;padding:2px 7px}
}
</style>
</head>

const AINFO = {
bubble:{name:'Qabarcıq Sıralama (Bubble Sort)',
  def:'Qonşu elementləri müqayisə edərək böyük olanı sona doğru "qabarcıq kimi" köçürür. Hər keçid (pass) sonunda ən böyük element öz yerinə düşür. Sadə, amma böyük massivilərdə yavaşdır.',
  how:['i = 0-dan n−2-yə: hər keçid üçün','j = 0-dan n−i−2-yə: qonşu cütlərə bax','arr[j] > arr[j+1] olarsa → arr[j] ilə arr[j+1]-i yerlə dəyiş (swap)','Keçid bitdikdə ən böyük element sona oturur','n−1 keçid sonunda massiv tam sıralanır'],
  loru:'Düşün ki bir sıra insan yüksəkliklərinə görə düzülmək istəyir. Yanındakına baxır — sağdakı özündən qısa olsa, yer dəyişirlər. Bu proses boylu adamları əvvəldən sona doğru "qabarcıq kimi" sürüşdürür. Hər tur sonunda ən hündür insan arxaya gedir.',
  niye:'Öyrənmək üçün ən asan sıralama alqoritmidir. Prinsipi başa düşmək digər sıralama alqoritmlərinin əsasını yaradır. Böyük massivlər üçün praktikada istifadə edilmir, amma müqayisə-əsaslı sıralama anlayışını öyrətmək üçün idealdır.',
  vs:'Insertion Sort ilə: hər ikisi O(n²) amma Insertion demək olar ki sıralanmış massivdə O(n)-ə yaxınlaşır, Bubble isə həmişə n² müqayisə aparır. Selection Sort ilə: Selection az swap edir (n−1), Bubble isə çox swap edə bilər. Üçü də böyük massivlər üçün yavaşdır — praktikada QuickSort/MergeSort seçilir.',
  t:'O(n²)',sp:'O(1)',best:'O(n)',
  code:{py:`def bubble_sort(arr):
    n = len(arr)
    for i in range(n - 1):           # n-1 keçid
        for j in range(n - i - 1):   # sona doğru azalır
            if arr[j] > arr[j+1]:
                arr[j], arr[j+1] = arr[j+1], arr[j]
    return arr`}},

insertion:{name:'Yerinəqoyma Sıralama (Insertion Sort)',
  def:'Kartları sıraladığınız kimi işləyir. Sıralanmamış hissədən bir element (key) götürür, sıralanmış hissədə onun düzgün yerinə qoyur. Kiçik və demək olar ki sıralanmış massivilərdə çox effektivdir.',
  how:['İlk element (i=0) sıralanmış hesab edilir','i = 1-dən başlayaraq hər element key kimi götürülür','j = i−1 pointerı sola doğru gedir; arr[j] > key olarsa arr[j+1] = arr[j] (sürüşdür)','j < 0 və ya arr[j] ≤ key olana kimi sürüşdürmə davam edir','arr[j+1] = key: key boşalan yerə yerləşdirilir'],
  loru:'Kart oynadığınızı düşünün. Əlinizə hər yeni kart gəldikdə onu əlinizdəki sıralanmış kartların içinə düzgün yerə qoyursunuz — böyük kartları bir-bir sağa keçirib yeri açırsınız, sonra kartı yerləşdirirsiniz.',
  niye:'Kiçik massivlər (n<50) üçün ən effektiv sadə sıralama alqoritmidir. "Demək olar ki sıralanmış" massivlər üçün mükəmməldir: O(n)-ə yaxınlaşır. Həm də "online" sıralama üçün idealdır — elementlər gəldikcə massivi sıralanmış saxlaya bilər.',
  vs:'Bubble ilə: hər ikisi O(n²) amma Insertion çox az köçürmə edir (shift), Bubble isə daima swap — praktikada Insertion daha sürətlidir. Selection ilə: Selection həmişə n−1 swap edir, Insertion isə kiçik/sıralanmış massivlər üçün minimum iş görür. Bubble vs Insertion vs Selection: üçü də O(n²) — Insertion real dünyada ən sürətlisidir.',
  t:'O(n²)',sp:'O(1)',best:'O(n)',
  code:{py:`def insertion_sort(arr):
    for i in range(1, len(arr)):
        key = arr[i]        # götürülən element
        j = i - 1
        while j >= 0 and arr[j] > key:
            arr[j+1] = arr[j]   # bir mövqe sağa sür
            j -= 1
        arr[j+1] = key      # düzgün yerə qoy
    return arr`}},

selection:{name:'Seçim Sıralama (Selection Sort)',
  def:'Hər addımda sıralanmamış hissənin minimumunu tapır və onu sıralanmamış hissənin əvvəlinə yerləşdirir. Yerdəyişmə sayı minimumdur (n-1), amma müqayisə sayı həmişə O(n²)-dir.',
  how:['i = 0-dan n−2-yə: hər keçid üçün','min_idx = i (bu keçidin müvəqqəti minimum indeksi)','j = i+1-dən n−1-ə: arr[j] < arr[min_idx] olarsa min_idx = j','Keçid bitdikdə arr[i] ilə arr[min_idx]-i yerlə dəyiş','Sıralanmış hissə bir element artır (sol tərəf)'],
  loru:'Qabda qarışıq düymələr var. Hər dəfə hamısına baxıb ən kiçiyi tapırsan, onu götürüb sıranın əvvəlinə qoyursan. Bunu n dəfə etdikdən sonra hamısı sıralanır. Üstünlüyü: çox az yer dəyişdirir.',
  niye:'Yerdəyişmə sayı sabit n−1 olduğundan yaddaşa yazmaq bahaya başa gəldikdə (məs., flash yaddaş, EEPROM) faydalıdır. Sadə implementasiya tələb edir. Amma stabil deyil: bərabər elementlərin sırası dəyişə bilər.',
  vs:'Bubble ilə: Selection az swap edir (n−1), Bubble isə O(n²) swap edə bilər. Insertion ilə: Insertion kiçik/sıralanmış massivlər üçün daha sürətlidir. Üçü arasında Selection ən az swap edir, lakin müqayisə sayı həmişə O(n²) — heç vaxt daha yaxşı olmur.',
  t:'O(n²)',sp:'O(1)',best:'O(n²)',
  code:{py:`def selection_sort(arr):
    n = len(arr)
    for i in range(n - 1):
        min_idx = i
        for j in range(i + 1, n):
            if arr[j] < arr[min_idx]:
                min_idx = j          # yeni minimum
        arr[i], arr[min_idx] = arr[min_idx], arr[i]
    return arr`}},

shell:{name:'Şell Sıralama (Shell Sort)',
  def:'Insertion Sort-un təkmilləşdirilmiş versiyasıdır. Uzaq məsafəli elementləri müqayisə edərək başlayır (gap = n/2), sonra gap azaldıqca adi Insertion Sort-a çevrilir. Orta ölçülü massivilərdə çox sürətlidir.',
  how:['gap = n//2 ilə başla','gap > 0 olduğu müddət: gap-aralı Insertion Sort tətbiq et','i = gap-dən n−1-ə: temp = arr[i] götür, gap məsafəli sol elementlərlə müqayisə et','arr[j−gap] > temp olarsa → arr[j] = arr[j−gap] (sürüşdür), j −= gap','arr[j] = temp yerləşdir. Sonra gap //= 2 et'],
  loru:'Uzun bir sıranı sıralamaq lazımdır. Əvvəlcə çox uzaq duranları (gap böyük) müqayisə edirsən — belə böyük qatlama baş verir. Sonra getdikcə yaxınlaşan cütləri müqayisə edirsən. Ən sonda qonşuları. Nəticədə Insertion Sort-dan çox daha sürətli işləyir.',
  niye:'Insertion Sort-dan əhəmiyyətli dərəcədə daha sürətlidir, eyni zamanda əlavə yaddaş tələb etmir (in-place, O(1)). Orta ölçülü massivlər (n ~ 1000-10000) üçün praktik seçimdir. Mürəkkəb kitabxana asılılığı olmayan sistemlər üçün uygundur.',
  vs:'Insertion Sort-un birbaşa genişləndirilməsidir — gap=1 olduqda tam adi Insertion Sort-a çevrilir. QuickSort/MergeSort ilə: Shell daha sadə implementasiyaya malikdir amma O(n log²n) ilə onlardan yavaşdır. Üstünlüyü: QuickSort kimi ən pis hal problemi yoxdur (pivot seçimi problemi).',
  t:'O(n log²n)',sp:'O(1)',best:'O(n log n)',
  code:{py:`def shell_sort(arr):
    n = len(arr)
    gap = n // 2
    while gap > 0:
        for i in range(gap, n):
            temp = arr[i]
            j = i
            while j >= gap and arr[j - gap] > temp:
                arr[j] = arr[j - gap]
                j -= gap
            arr[j] = temp
        gap //= 2           # gap azaldılır
    return arr`}},

quick:{name:'Sürətli Sıralama (QuickSort)',
  def:'"Parçala və idarə et" (Divide & Conquer) prinsipinə əsaslanır. Pivot seçilir, massiv pivotdan kiçik/böyük olanlara bölünür (partition), hər hissə rekursiv sıralanır. Orta halda O(n log n) ən sürətli sıralama alqoritmlərindən biridir.',
  how:['Əgər low ≥ high ise dur (baza halı)','Partition: son element pivot seçilir (arr[high])','i = low−1; j = low-dan high−1-ə: arr[j] ≤ pivot olarsa i++ və arr[i]↔arr[j] swap','Son olaraq arr[i+1]↔arr[high]: pivot öz yerinə oturur, p = i+1','Rekursiv: quicksort(arr, low, p−1) və quicksort(arr, p+1, high)'],
  loru:'Sinif rəhbəri deyir: "Məndən qısa olanlar sola, uzun olanlar sağa keçin!" — bu "pivot" özüdür. Sonra hər qrup üçün öz aralarında eyni qaydanı tətbiq edir. Getdikcə qruplar kiçilir, axırda hamı sıralanır.',
  niye:'Orta halda O(n log n) ilə ən sürətli praktik sıralama alqoritmidir. Cache-dostu (cache-friendly), in-place — əlavə yaddaş tələb etmir. Python, Java, C++ standart kitabxanalarında (müxtəlif variasiyalarda) istifadə edilir.',
  vs:'Merge Sort ilə: hər ikisi O(n log n) orta. QuickSort in-place (O(log n) stack), Merge O(n) əlavə yaddaş. Ən pis hal: QuickSort O(n²) (sıralanmış + kötü pivot), Merge həmişə O(n log n). Stabil: Merge Sort ✓, QuickSort ✗. Shell Sort ilə: QuickSort daha sürətlidir amma pivot seçimi vacibdir.',
  t:'O(n log n)',sp:'O(log n)',best:'O(n log n)',
  code:{py:`def quicksort(arr, low=0, high=None):
    if high is None:
        high = len(arr) - 1
    if low < high:
        p = partition(arr, low, high)
        quicksort(arr, low, p - 1)
        quicksort(arr, p + 1, high)

def partition(arr, low, high):
    pivot = arr[high]    # son element — pivot
    i = low - 1
    for j in range(low, high):
        if arr[j] <= pivot:
            i += 1
            arr[i], arr[j] = arr[j], arr[i]
    arr[i+1], arr[high] = arr[high], arr[i+1]
    return i + 1`}},

merge:{name:'Birləşdirmə Sıralama (Merge Sort)',
  def:'Massivi yarıya bölür, hər yarını rekursiv sıralayır, sonra iki sıralanmış yarını birləşdirir. Həmişə O(n log n) vaxt tələb edir — stabil sıralamadır. Əlavə O(n) yaddaş lazımdır.',
  how:['Əgər massiv 1 elementdirsə, sıralanmış say (baza halı)','mid = len//2: massivi sol [0..mid] və sağ [mid..n] hissəyə böl','Hər hissəni rekursiv sırala: merge_sort(left), merge_sort(right)','merge(left, right): i,j göstəriciləri ilə kiçik olanı nəticəyə əlavə et','Qalan elementlər nəticəyə əlavə edilir; sıralanmış massiv qaytarılır'],
  loru:'Bir kitabxanada kitablar qarışıqdır. Kitabxanaçı onları iki yerə bölüb iki köməkçiyə verir. Hər köməkçi öz payını eyni üsulla sıralayır (rekursiv). Sonra hər ikisi öz sıralanmış yığınından növbəylə ən kiçiyi götürüb birləşdirir.',
  niye:'Həmişə O(n log n) olduğundan (worst case yoxdur) böyük, qeyri-müəyyən massivlər üçün etibarlı seçimdir. Stabil sıralama — bərabər elementlərin sırası saxlanılır. Əlaqəli siyahılar (linked list) üçün mükəmməldir (əlavə yaddaş lazım deyil).',
  vs:'QuickSort ilə: MergeSort həmişə O(n log n), QuickSort ən pis O(n²). Amma QuickSort in-place, Merge O(n) əlavə yaddaş. HeapSort ilə: ikisi də O(n log n) worst case, Merge stabil ✓ HeapSort ✗. Praktikada QuickSort çox vaxt daha sürətlidir (cache effekti). TimSort (Python-un sort()-u) MergeSort əsasındadır.',
  t:'O(n log n)',sp:'O(n)',best:'O(n log n)',
  code:{py:`def merge_sort(arr):
    if len(arr) <= 1:
        return arr
    mid = len(arr) // 2
    left  = merge_sort(arr[:mid])
    right = merge_sort(arr[mid:])
    return merge(left, right)

def merge(left, right):
    result, i, j = [], 0, 0
    while i < len(left) and j < len(right):
        if left[i] <= right[j]:
            result.append(left[i]); i += 1
        else:
            result.append(right[j]); j += 1
    return result + left[i:] + right[j:]`}},

prim:{name:'Prim Alqoritmi — Minimal Örtən Ağac (MST)',
  def:'Bir başlanğıc təpəsindən başlayaraq MST qurur. Hər addımda ağacdakı təpələrdən çölə çıxan ən kiçik çəkili kənar seçilir. Prioritet növbə (min-heap) istifadə edilir. Sıx qraflarda Kruskal-dan daha effektivdir.',
  how:['Başlanğıc təpəsini (1) visited et, ondan çıxan kənarları heap-ə əlavə et','heap-dən ən kiçik çəkili kənar (w, u, v) götür','Əgər v artıq visited-dirsə, at (keç)','Deyilsə: visited[v] = True, kənar MST-ə əlavə olunur','v-dən çıxan ziyarətsiz kənarlar heap-ə əlavə edilir. Bütün V ziyarət olana kimi davam et'],
  loru:'Bir əyalətdə şəhərlər var, onlar arasında elektrik xətti çəkmək lazımdır. Ən ucuz xətdən başlayırsan. Hər addımda şəbəkəyə qoşulmuş şəhərlərdən kənara çıxan ən ucuz xətti seçib yeni şəhər əlavə edirsən. Bütün şəhərlər birləşənə kimi davam edir.',
  niye:'Sıx qraflarda (E ≈ V², yəni demək olar ki hər cüt tepə bağlıdır) Kruskal-dan daha effektivdir. Bir nöqtədən genişləndiyi üçün prosesi vizuallaşdırmaq asandır. Coğrafi şəbəkə dizaynında, elektrik şəbəkəsi planlamasında istifadə olunur.',
  vs:'Kruskal ilə: HƏR İKİSİ eyni MST-i tapır (nəticə eynidir!). Prim bir tepedən başlayıb genişlənir → sıx qraflar üçün yaxşı. Kruskal bütün kənarları qlobal sıralayıb seçir → seyrək qraflar üçün yaxşı. Prim: visited[] massivi; Kruskal: Union-Find. Dijkstra ilə oxşarlıq: kod strukturu demək olar ki eynidir, amma məqsəd fərqlidir — Prim MST tapır, Dijkstra ən qısa YOL tapır.',
  t:'O(E log V)',sp:'O(V+E)',best:'O(E log V)',
  code:{py:`import heapq

def prim(graph, start=0):
    n = len(graph)
    visited = [False] * n
    visited[start] = True
    # frontier: (ceki, haradan, hara)
    heap = [(w, start, v) for v,w in graph[start]]
    heapq.heapify(heap)
    mst, total = [], 0
    while heap and sum(visited) < n:
        w, u, v = heapq.heappop(heap)
        if visited[v]: continue
        visited[v] = True
        mst.append((u, v, w)); total += w
        for nv, nw in graph[v]:
            if not visited[nv]:
                heapq.heappush(heap, (nw, v, nv))
    return mst, total`}},

kruskal:{name:'Kruskal Alqoritmi — Minimal Örtən Ağac (MST)',
  def:'Bütün kənarları çəkiyə görə artan sıraya düzür, sonra hər birini nəzərdən keçirir: dövrə yaratmırsa qəbul edir (Union-Find ilə yoxlayır). Seyrək qraflarda Prim-dən daha effektivdir.',
  how:['Bütün kənarları çəkiyə görə artan sıraya düz','Hər kənar üçün Union-Find ilə ru = find(u), rv = find(v) tap','ru == rv olarsa: u və v eyni komponentdədir — kənar dövrə yaradır → rədd et','ru ≠ rv olarsa: kənar MST-ə əlavə et, parent[ru] = rv (birləşdir)','V−1 kənar seçiləndə MST hazırdır'],
  loru:'Şəhərlər arasındakı bütün yolların siyahısını ucuzdan bahaya sıralayırsan. Ən ucuzdan başlayırsan. Əgər yol iki şəhəri birləşdirir amma onlar artıq başqa yollarla birbirinə bağlıdırsa (dövrə yaranır) — o yolu atırsan. Yoxsa qəbul edirsən.',
  niye:'Seyrək qraflarda (E ≪ V²) Prim-dən daha effektivdir. Union-Find dövrəni O(α(V)) — praktikada sabit vaxtda — yoxlayır. Coğrafi xəritə, kabel şəbəkəsi, boru kəmərləri planlamasında istifadə edilir.',
  vs:'Prim ilə: HƏR İKİSİ eyni MST-i tapır (fərqli alqoritm, eyni cavab!). Kruskal qlobal kənar sıralaması → seyrək qraflar üçün O(E log E). Prim tepə-tepə genişlənmə → sıx qraflar üçün O(E log V). Kruskal: Union-Find; Prim: min-heap. Xülasə: "Kənarlar" alqoritmi (Kruskal) vs "Tepelər" alqoritmi (Prim).',
  t:'O(E log E)',sp:'O(V)',best:'O(E log E)',
  code:{py:`def find(parent, x):       # Union-Find: kök tap
    while parent[x] != x:
        parent[x] = parent[parent[x]]
        x = parent[x]
    return x

def kruskal(vertices, edges):  # edges: (w, u, v)
    parent = {v: v for v in vertices}
    mst, total = [], 0
    for w, u, v in sorted(edges):
        ru, rv = find(parent, u), find(parent, v)
        if ru != rv:               # dövrə yoxdur
            parent[ru] = rv
            mst.append((u, v, w)); total += w
    return mst, total`}},

dijkstra:{name:'Deykstra Alqoritmi — Ən Qısa Yol',
  def:'Bir mənbə təpəsindən bütün digər təpələrə olan ən qısa yolları tapır. Hər addımda sıralanmamış təpələr arasından ən qısa məsafəlisi seçilir (greedy), onun qonşuları üçün məsafələr yenilənir (relaxation). Mənfi çəkilərlə işləmir.',
  how:['dist[source]=0, bütün digər dist[v]=∞; heap-ə (0, source) əlavə et','heap-dən ən kiçik (d, u) götür; d > dist[u] olarsa keç (köhnə giriş)','u-nun hər qonşusu v üçün: dist[u]+w < dist[v] olarsa → dist[v] = dist[u]+w (relaxation)','Yenilənmiş v-ni heap-ə əlavə et: heappush(heap, (dist[v], v))','Bütün tepeler yekunlaşana kimi davam et; dist[] bütün ən qısa yolları saxlayır'],
  loru:'GPS naviqasiyası kimi işləyir. Başlanğıc nöqtəndən yola çıxırsan, dist[sən]=0, qalanlar ∞. Hər yol ayrıcında ən yaxın tanınan şəhəri seçirsən. O şəhər üzərindən qonşularına daha qısa yol tapılırsa, onların məsafəsini yeniləyirsən.',
  niye:'GPS naviqasiyası, internet marşrutlaması (OSPF protokolu), oyunlarda AI path-finding, aviasiya çizelgesi üçün istifadə olunur. Mənfi çəkili kənar olmadıqda ən effektiv ən qısa yol alqoritmidir.',
  vs:'Prim ilə oxşarlıq: hər ikisi min-heap + greedy. AMMA fərq: Prim MST tapır (minimum ağac), Dijkstra ən qısa YOL tapır. BFS ilə: BFS bütün kənarları çəki=1 sayır (çəkisiz qraf üçün), Dijkstra çəkiləri nəzərə alır. Bellman-Ford ilə: B-F mənfi çəkilərlə işləyir amma O(VE) — daha yavaş. Floyd-Warshall: bütün cütlər arası ən qısa yollar O(V³).',
  t:'O(E log V)',sp:'O(V)',best:'O(E log V)',
  code:{py:`import heapq

def dijkstra(graph, source):
    dist = {v: float('inf') for v in graph}
    dist[source] = 0
    heap = [(0, source)]
    while heap:
        d, u = heapq.heappop(heap)
        if d > dist[u]: continue       # köhnə giriş
        for v, w in graph[u]:
            if dist[u] + w < dist[v]:  # relaxation
                dist[v] = dist[u] + w
                heapq.heappush(heap, (dist[v], v))
    return dist`}},

function bubbleSteps(arr){
  const S=[];const a=[...arr];const n=a.length;
  let ops=0,swaps=0;
  S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,swaps,codeLine:1,
    title:'Başlanğıc / Start',
    desc:`<b>Massiv (Array):</b> [${a.join(', ')}]<br><br>Qabarcıq sıralama n=${n} ölçülü massivə tətbiq olunacaq. Qonşu cütlər müqayisə edilir; böyük olan sağa "qabarcıq kimi" köçürülür. Hər <i>keçid</i> sonunda ən böyük element öz yerinə düşür.<br><small style="color:var(--muted)">Bubble sort will compare adjacent pairs and push the largest to the right. Each pass places the biggest unsorted element in its final position.</small>`});
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-i-1;j++){
      const v0=a[j],v1=a[j+1];ops++;
      const needSwap=v0>v1;
      const sortedSet=new Set(Array.from({length:i},(_,k)=>n-1-k));
      S.push({arr:[...a],cmp:[j,j+1],sorted:sortedSet,sp:{},ops,swaps,codeLine:[2,3,4],
        title:`Keçid ${i+1}, müqayisə j=${j} / Pass ${i+1}, compare j=${j}`,

      if(needSwap){[a[j],a[j+1]]=[a[j+1],a[j]];swaps++;
        S.push({arr:[...a],cmp:[j,j+1],sorted:sortedSet,sp:{swp:true},ops,swaps,codeLine:5,
          title:`Yerdəyişmə: arr[${j}]↔arr[${j+1}] / Swap`,
          desc:`<b>Kod sətri / Code line:</b> <code>arr[${j}], arr[${j+1}] = arr[${j+1}], arr[${j}]</code><br><br><b style="color:var(--amber)">${v0}</b> və <b style="color:var(--amber)">${v1}</b> yerlərini dəyişdi (swapped).<br>Massiv indi / Array now: <b>[${a.join(', ')}]</b><br><br>Yerdəyişmə sayı / Swaps: <b>${swaps}</b>`});}
    }
    const sortedSet=new Set(Array.from({length:i+1},(_,k)=>n-1-k));
    S.push({arr:[...a],cmp:[],sorted:sortedSet,sp:{},ops,swaps,codeLine:2,
      title:`${i+1}-ci keçid bitdi / Pass ${i+1} complete`,
      desc:`<b style="color:var(--teal)">${a[n-1-i]}</b> elementi öz son mövqeyinə (indeks <b>${n-1-i}</b>) çatdı — artıq hərəkət etməyəcək.<br><small style="color:var(--muted)">The largest unsorted element has bubbled to its final position at index ${n-1-i}.</small><br><br>Sıralanmış / Sorted: <b style="color:var(--teal)">[${[...sortedSet].sort((a,b)=>a-b).map(i=>a[i]).join(', ')}]</b>`});
  }
  S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:n},(_,k)=>k)),sp:{},ops,swaps,codeLine:6,
    title:'Sıralama tamamlandı ✓ / Sorting complete',

  return S;
}

function insertionSteps(arr){
  const S=[];const a=[...arr];const n=a.length;
  let ops=0,moves=0;
  S.push({arr:[...a],cmp:[],sorted:new Set([0]),sp:{},ops,swaps:moves,codeLine:0,
    title:'Başlanğıc / Start',
    desc:`<b>Massiv / Array:</b> [${a.join(', ')}]<br><br>Yerinəqoyma sıralama ilk elementi (arr[0]=${a[0]}) sıralanmış hesab edərək başlayır. Hər addımda sıralanmamış hissədən bir "açar" (key) götürülür və sıralanmış hissədə öz yerinə qoyulur — kartları sıraladığınız kimi!<br><small style="color:var(--muted)">Insertion sort starts with the first element as "sorted". Each step picks the next key and inserts it into the correct position in the sorted portion.</small>`});
  for(let i=1;i<n;i++){
    const key=a[i];
    S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:i},(_,k)=>k)),sp:{key:i},ops,swaps:moves,codeLine:[1,2,3],
      title:`i=${i}: Açar götürüldü / Key picked`,
      desc:`<b>Kod / Code:</b> <code>key = arr[${i}]</code><br><br>Açar (key) = <b style="color:var(--blue)">${key}</b> (mövqe <b>${i}</b>).<br>Sıralanmış hissə / Sorted portion: <b style="color:var(--teal)">[${a.slice(0,i).join(', ')}]</b><br>İndi key=${key}-i bu hissədə düzgün yerə qoyacağıq.<br><small style="color:var(--muted)">j pointer starts at ${i-1} and will scan left.</small>`});
    let j=i-1;
    while(j>=0&&a[j]>key){
      ops++;moves++;
      a[j+1]=a[j];
      S.push({arr:[...a],cmp:[j,j+1],sorted:new Set(Array.from({length:i},(_,k)=>k)),sp:{key:j+1},ops,swaps:moves,codeLine:[4,5,6],
        title:`Sürüş: arr[${j}]=${a[j]} > key=${key} / Shift right`,
        desc:`<b>Kod / Code:</b> <code>arr[${j+1}] = arr[${j}]</code><br><br><b style="color:var(--amber)">${a[j]}</b> (mövqe ${j}) sağa sürüşdürüldü → mövqe ${j+1}.<br>Key <b>${key}</b> hələ öz yerini axtarır.<br><small style="color:var(--muted)">Shift: ${a[j]} moved from index ${j} → ${j+1}. Operations: ${ops}</small>`});
      j--;
    }
    ops++;
    a[j+1]=key;
    const sorted2=new Set(Array.from({length:i+1},(_,k)=>k));
    S.push({arr:[...a],cmp:[],sorted:sorted2,sp:{},ops,swaps:moves,codeLine:7,
      title:`Yerləşdirildi: arr[${j+1}]=${key} / Inserted`,
      desc:`<b>Kod / Code:</b> <code>arr[${j+1}] = key  # key = ${key}</code><br><br><b style="color:var(--blue)">${key}</b> mövqe <b>${j+1}</b>-ə yerləşdirildi.<br>Sıralanmış hissə / Sorted: <b style="color:var(--teal)">[${a.slice(0,i+1).join(', ')}]</b>`});
  }
  S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:n},(_,k)=>k)),sp:{},ops,swaps:moves,codeLine:8,
    title:'Sıralama tamamlandı ✓ / Sorting complete',
    desc:`<b>Nəticə / Result:</b> <b style="color:var(--teal)">[${a.join(', ')}]</b><br><br>Cəmi <b>${ops}</b> müqayisə (comparison), <b>${moves}</b> sürüş (shift).<br><small style="color:var(--muted)">All keys have been inserted into their correct positions.</small>`});
  return S;
}

function selectionSteps(arr){
  const S=[];const a=[...arr];const n=a.length;

  for(let i=0;i<n-1;i++){
    let minIdx=i;

    S.push({arr:[...a],cmp:[],sorted:sortedSet,sp:{min:i},ops,swaps,codeLine:[2,3],
      title:`Keçid ${i+1}: min_idx=${i} / Pass ${i+1}`,

    for(let j=i+1;j<n;j++){
      ops++;

        title:`j=${j}: arr[${j}]=${a[j]} ${isNew?'<':'≥'} min=${a[minIdx]}`,

      if(isNew)minIdx=j;
    }
    if(minIdx!==i){[a[i],a[minIdx]]=[a[minIdx],a[i]];swaps++;}

    S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:i+1},(_,k)=>k)),sp:{},ops,swaps,codeLine:7,

      desc:`<b>Kod:</b> <code>arr[${i}], arr[${minIdx!==i?minIdx:i}] = arr[${minIdx!==i?minIdx:i}], arr[${i}]</code><br><b style="color:var(--teal)">${a[i]}</b> mövqe <b>${i}</b>-ə yerləşdi${minIdx!==i?` (${minIdx}↔${i} dəyişdi / swapped)`:" (yerdəyişmə lazım deyildi)"}<br>Sıralanmış: <b style="color:var(--teal)">[${a.slice(0,i+1).join(', ')}]</b>`});
  }
  S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:n},(_,k)=>k)),sp:{},ops,swaps,codeLine:8,

    desc:`Nəticə: <b style="color:var(--teal)">[${a.join(', ')}]</b><br>Cəmi <b>${ops}</b> müqayisə, <b>${swaps}</b> yerdəyişmə.<br><small style="color:var(--muted)">Selection Sort always makes exactly O(n²) comparisons regardless of input.</small>`});
  return S;

function shellSteps(arr){
  const S=[];const a=[...arr];const n=a.length;
  let ops=0,moves=0;
  const gaps=[];let g=Math.floor(n/2);while(g>0){gaps.push(g);g=Math.floor(g/2);}

  for(const gap of gaps){
    S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,swaps:moves,gap,codeLine:3,
      title:`Yeni mərhələ: gap=${gap} / New phase`,
      desc:`<b>Kod:</b> <code>while gap > 0</code> → gap = <b style="color:var(--amber)">${gap}</b><br>Bu mərhələdə elementlər <b>${gap}</b> mövqe aralı müqayisə edilir.<br><small style="color:var(--muted)">Gap ${gap}: comparing elements ${gap} positions apart — this is ${gap}-spaced Insertion Sort.</small>`});
    for(let i=gap;i<n;i++){
      const temp=a[i];let j=i;
      S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{key:i},ops,swaps:moves,gap,codeLine:[4,5,6],
        title:`gap=${gap}, i=${i}: temp=${temp} götürüldü`,
        desc:`<b>Kod:</b> <code>temp = arr[${i}]  # temp = ${temp}</code><br>j = ${i}. İndi arr[j-gap]=arr[${j-gap}]=<b>${a[j-gap]}</b> ilə müqayisə başlayır.`});
      while(j>=gap&&a[j-gap]>temp){
        ops++;moves++;a[j]=a[j-gap];
        S.push({arr:[...a],cmp:[j-gap,j],sorted:new Set(),sp:{key:j},ops,swaps:moves,gap,codeLine:[7,8,9],
          title:`Sürüş: arr[${j-gap}]=${a[j]} > temp=${temp}`,
          desc:`<b>Kod:</b> <code>arr[${j}] = arr[${j-gap}]</code><br><b style="color:var(--amber)">${a[j]}</b> (mövqe ${j-gap}) → mövqe <b>${j}</b><br>j = ${j} − ${gap} = ${j-gap}. Davam edir...`});
        j-=gap;
      }
      ops++;a[j]=temp;
      S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,swaps:moves,gap,codeLine:10,
        title:`Yerləşdirildi: arr[${j}]=${temp}`,
        desc:`<b>Kod:</b> <code>arr[${j}] = temp  # ${temp}</code><br><b style="color:var(--blue)">${temp}</b> mövqe <b>${j}</b>-ə qoyuldu. Massiv: [${a.join(', ')}]`});
    }
    S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,swaps:moves,gap,codeLine:11,
      title:`gap=${gap} mərhələsi bitdi / Phase done`,
      desc:`<b>Kod:</b> <code>gap //= 2</code> → növbəti gap = <b>${Math.floor(gap/2)||'0 (bitdi)'}</b><br>Bu mərhələdəki bütün ${gap}-aralı sıralar tamamlandı.`});
  }
  S.push({arr:[...a],cmp:[],sorted:new Set(Array.from({length:n},(_,k)=>k)),sp:{},ops,swaps:moves,gap:null,codeLine:12,
    title:'Sıralama tamamlandı ✓ / Done',
    desc:`Nəticə: <b style="color:var(--teal)">[${a.join(', ')}]</b><br>Cəmi <b>${ops}</b> müqayisə, <b>${moves}</b> köçürmə.`});
  return S;
}

function quickSteps(arr){
  const S=[];const a=[...arr];const n=a.length;
  let ops=0,swaps=0;
  const sortedGlobal=new Set();
  S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,swaps,codeLine:[0,3],
    title:'Başlanğıc / Start',
    desc:`Massiv: <b>[${a.join(', ')}]</b> (n=${n})<br>QuickSort "parçala və idarə et" (divide & conquer) prinsipindədir. Son element <b>pivot</b> seçilir, massiv pivotdan kiçik/böyük hissələrə bölünür.<br><small style="color:var(--muted)">QuickSort picks pivot, partitions array, then recurses on both halves.</small>`});
  const stack=[[0,n-1]];
  while(stack.length>0){
    const [low,high]=stack.pop();
    if(low>=high){if(low===high)sortedGlobal.add(low);continue;}
    const pivot=a[high];
    S.push({arr:[...a],cmp:[],sorted:new Set(sortedGlobal),sp:{pivot:high},ops,swaps,codeLine:[8,9,10],
      title:`Pivot: arr[${high}]=${pivot} (alt[${low}..${high}])`,
      desc:`<b>Kod:</b> <code>pivot = arr[${high}]  # ${pivot}</code><br>Alt massiv [<b>${low}</b>..<b>${high}</b>] üçün pivot = <b style="color:var(--purple)">${pivot}</b> (son element).<br>i = ${low}-1 = ${low-1}. Partition dövrü başlayır.`});
    let i=low-1;
    for(let j=low;j<high;j++){
      ops++;
      const le=a[j]<=pivot;
      S.push({arr:[...a],cmp:[j,high],sorted:new Set(sortedGlobal),sp:{pivot:high},ops,swaps,codeLine:[11,12],
        title:`j=${j}: arr[${j}]=${a[j]} ${le?'≤':'>'}  pivot=${pivot}`,
        desc:`<b>Kod:</b> <code>if arr[${j}] <= pivot</code><br>arr[${j}]=<b style="color:var(--amber)">${a[j]}</b> ${le?'≤':'>'} pivot=<b style="color:var(--purple)">${pivot}</b> → ${le?'i artır, swap lazım':'keç (skip)'}<br><small style="color:var(--muted)">Ops: ${ops}, i=${i}</small>`});
      if(le){i++;if(i!==j){[a[i],a[j]]=[a[j],a[i]];swaps++;
        S.push({arr:[...a],cmp:[i,j],sorted:new Set(sortedGlobal),sp:{pivot:high,swp:true},ops,swaps,codeLine:[13,14],
          title:`Swap: arr[${i}]↔arr[${j}]`,
          desc:`<b>Kod:</b> <code>i += 1; arr[i], arr[j] = arr[j], arr[i]</code><br>i=${i}: <b style="color:var(--amber)">${a[j]}</b>↔<b style="color:var(--amber)">${a[i]}</b> dəyişdi<br>Massiv: [${a.join(', ')}]`});}}
    }
    [a[i+1],a[high]]=[a[high],a[i+1]];swaps++;sortedGlobal.add(i+1);
    S.push({arr:[...a],cmp:[],sorted:new Set(sortedGlobal),sp:{pivot:i+1},ops,swaps,codeLine:15,
      title:`Pivot yerinə qoyuldu: mövqe ${i+1}`,
      desc:`<b>Kod:</b> <code>arr[i+1], arr[high] = arr[high], arr[i+1]</code><br>Pivot <b style="color:var(--purple)">${a[i+1]}</b> mövqe <b>${i+1}</b>-ə qoyuldu — artıq bu yer <b>sabitdir</b>!<br>Sol alt: [${low}..${i}] · Sağ alt: [${i+2}..${high}]`});
    if(i+2<=high)stack.push([i+2,high]);
    if(low<=i)stack.push([low,i]);
  }
  for(let k=0;k<n;k++)sortedGlobal.add(k);
  S.push({arr:[...a],cmp:[],sorted:new Set(sortedGlobal),sp:{},ops,swaps,codeLine:5,
    title:'QuickSort tamamlandı ✓ / Done',
    desc:`Nəticə: <b style="color:var(--teal)">[${a.join(', ')}]</b><br>Cəmi <b>${ops}</b> müqayisə, <b>${swaps}</b> yerdəyişmə.`});
  return S;
}

function mergeSteps(arr){
  const S=[];const a=[...arr];const n=a.length;
  let ops=0;
  S.push({arr:[...a],cmp:[],sorted:new Set(),sp:{},ops,mergeInfo:'',codeLine:[0,3],
    title:'Başlanğıc / Start',
    desc:`Massiv: <b>[${a.join(', ')}]</b> (n=${n})<br>Merge Sort massivi rekursiv ikiyə bölür, sonra sıralanmış hissələri birləşdirir.<br><small style="color:var(--muted)">Divide: split → Conquer: recurse → Combine: merge sorted halves.</small>`});
  function doMerge(arr2,l,m,r,depth){
    const left=arr2.slice(l,m+1);const right=arr2.slice(m+1,r+1);
    let i=0,j=0,k=l;
    const info=`merge([${l}..${m}]+[${m+1}..${r}])`;
    S.push({arr:[...arr2],cmp:[],sorted:new Set(),sp:{lrange:[l,m],rrange:[m+1,r]},ops,mergeInfo:info,codeLine:[8,9],
      title:`merge başlayır: [${l}..${m}]+[${m+1}..${r}]`,
      desc:`<b>Kod:</b> <code>def merge(left, right)</code><br>Sol (left): <b style="color:#3b5bc0">[${left.join(', ')}]</b><br>Sağ (right): <b style="color:#7c3aed">[${right.join(', ')}]</b><br>İki göstərici (i=0, j=0) eyni vaxtda irəliləyir.`});
    while(i<left.length&&j<right.length){
      ops++;
      const le=left[i]<=right[j];
      S.push({arr:[...arr2],cmp:[l+i,m+1+j],sorted:new Set(),sp:{lrange:[l,m],rrange:[m+1,r]},ops,mergeInfo:info,codeLine:[10,11],
        title:`Müqayisə: left[${i}]=${left[i]} ${le?'≤':'>'} right[${j}]=${right[j]}`,
        desc:`<b>Kod:</b> <code>if left[${i}] <= right[${j}]</code><br>left[${i}]=<b style="color:#6b8af7">${left[i]}</b> vs right[${j}]=<b style="color:#a78bf7">${right[j]}</b><br>→ <b style="color:var(--teal)">${le?left[i]:right[j]}</b> nəticəyə əlavə edilir`});
      if(le){arr2[k++]=left[i++];S.push({arr:[...arr2],cmp:[],sorted:new Set(),sp:{lrange:[l,m],rrange:[m+1,r],placed:k-1},ops,mergeInfo:info,codeLine:12,
        title:`arr[${k-1}]=${arr2[k-1]} yazıldı (soldan)`,
        desc:`<b>Kod:</b> <code>result.append(left[${i-1}]); i += 1</code><br><b style="color:var(--teal)">${arr2[k-1]}</b> → mövqe <b>${k-1}</b>. i=${i}, j=${j}`});}
      else{arr2[k++]=right[j++];S.push({arr:[...arr2],cmp:[],sorted:new Set(),sp:{lrange:[l,m],rrange:[m+1,r],placed:k-1},ops,mergeInfo:info,codeLine:14,
        title:`arr[${k-1}]=${arr2[k-1]} yazıldı (sağdan)`,
        desc:`<b>Kod:</b> <code>result.append(right[${j-1}]); j += 1</code><br><b style="color:var(--teal)">${arr2[k-1]}</b> → mövqe <b>${k-1}</b>. i=${i}, j=${j}`});}
    }
    while(i<left.length){arr2[k++]=left[i++];}
    while(j<right.length){arr2[k++]=right[j++];}
    const done=new Set(Array.from({length:r-l+1},(_,x)=>l+x));
    S.push({arr:[...arr2],cmp:[],sorted:done,sp:{},ops,mergeInfo:'',codeLine:15,
      title:`merge tamamlandı [${l}..${r}]`,
      desc:`<b>Kod:</b> <code>return result + left[i:] + right[j:]</code><br>[${l}..${r}] sıralandı: <b style="color:var(--teal)">[${arr2.slice(l,r+1).join(', ')}]</b>`});
  }
  function msort(arr2,l,r,depth){
    if(l>=r)return;
    const m=Math.floor((l+r)/2);
    S.push({arr:[...arr2],cmp:[],sorted:new Set(),sp:{lrange:[l,m],rrange:[m+1,r]},ops,mergeInfo:`Böl: [${l}..${r}]→[${l}..${m}]+[${m+1}..${r}]`,codeLine:[3,4,5],
      title:`Böl: [${l}..${r}] / Divide`,
      desc:`<b>Kod:</b> <code>mid = ${m}</code><br>left = arr[${l}:${m+1}] = <b>[${arr2.slice(l,m+1).join(', ')}]</b><br>right = arr[${m+1}:${r+1}] = <b>[${arr2.slice(m+1,r+1).join(', ')}]</b>`});
    msort(arr2,l,m,depth+1);
    msort(arr2,m+1,r,depth+1);
    doMerge(arr2,l,m,r,depth);
  }
  const tmp=[...a];msort(tmp,0,n-1,0);
  S.push({arr:[...tmp],cmp:[],sorted:new Set(Array.from({length:n},(_,k)=>k)),sp:{},ops,mergeInfo:'',codeLine:6,
    title:'Merge Sort tamamlandı ✓ / Done',
    desc:`Nəticə: <b style="color:var(--teal)">[${tmp.join(', ')}]</b><br>Cəmi <b>${ops}</b> müqayisə. Merge Sort həmişə O(n log n) işləyir.`});
  return S;
}

const GNODES=[

];
const SVGNS='http://www.w3.org/2000/svg';
const ek=(a,b)=>[Math.min(a,b),Math.max(a,b)].join('-');

function svgEl(tag,attrs,text){
  const el=document.createElementNS(SVGNS,tag);
  Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));
  if(text!=null)el.textContent=text;
  return el;
}

function buildGraphSVG(container,edges,state){
  container.innerHTML='';
  const svg=svgEl('svg',{class:'gviz',viewBox:'0 0 560 350',role:'img'});

  edges.forEach(e=>{
    const k=ek(e[0],e[1]);
    const na=GNODES.find(n=>n.id===e[0]),nb=GNODES.find(n=>n.id===e[1]);
    let cls='gedge';
    if(state.tree&&state.tree.has(k)) cls+=' tree';
    else if(state.consider===k) cls+=state.reject?' reject':' consider';
    svg.appendChild(svgEl('line',{x1:na.x,y1:na.y,x2:nb.x,y2:nb.y,class:cls}));
    // weight badge
    const mx=(na.x+nb.x)/2,my=(na.y+nb.y)/2;
    const hot=state.consider===k,on=state.tree&&state.tree.has(k);
    const bgStroke=hot?(state.reject?'#f0716e':'#f5a623'):on?'#2dd4bf':'#283242';
    const txtFill=hot?(state.reject?'#f0716e':'#f5a623'):on?'#2dd4bf':'#9aa6b6';
    const g=svgEl('g',{class:'wbadge'+(hot?' hot':on?' on':'')});
    g.appendChild(svgEl('rect',{x:mx-14,y:my-12,width:28,height:24,rx:5,fill:'#0d1117',stroke:bgStroke,'stroke-width':1.5}));

    svg.appendChild(g);
  });

  GNODES.forEach(n=>{
    const inMST=state.inNodes&&state.inNodes.has(n.id);
    const isCur=state.cur===n.id;

    g.appendChild(svgEl('text',{class:'lbl',x:n.x,y:n.y},n.id));
    // dist label for Dijkstra — show ∞ for unvisited too
    if(state.dist){
      const d=state.dist[n.id];
      const dTxt=d===undefined?'':d===Infinity?'∞':d;
      const dEl=svgEl('text',{class:'dlbl',x:n.x,y:n.y-38,'text-anchor':'middle','font-size':12},'d='+dTxt);
      if(isCur)dEl.setAttribute('fill','#f5a623');
      else if(inMST)dEl.setAttribute('fill','#2dd4bf');
      g.appendChild(dEl);
    }
    // node status label (for MST algos)
    if(inMST&&!state.dist){
      const lEl=svgEl('text',{x:n.x,y:n.y+42,'text-anchor':'middle','font-size':10,'fill':'#2dd4bf','font-family':'Space Grotesk,sans-serif'},'MST');
      g.appendChild(lEl);
    }
    svg.appendChild(g);
  });

  // Graph legend row
  const legendY=332;
  const algo=curProb&&curProb.algo;
  const items=algo==='dijkstra'
    ?[['#2dd4bf','Ziyarət edildi/Visited'],['#f5a623','Cari/Current'],['#8b96a5','Ziyarət edilməyib/Unvisited']]
    :[['#2dd4bf','MST-də/In MST'],['#f5a623','Yeni əlavə/Just added'],['#f0716e','Rədd/Rejected'],['#8b96a5','Kənarda/Outside']];
  let lx=14;

    g.appendChild(svgEl('text',{x:lx+16,y:legendY,'dominant-baseline':'central','font-size':10,'fill':'#8b96a5','font-family':'Inter,sans-serif'},lbl));

function primSteps(edges){
  const S=[];
  const adj={};for(let i=1;i<=5;i++)adj[i]=[];
  edges.forEach(e=>{adj[e[0]].push([e[1],e[2]]);adj[e[1]].push([e[0],e[2]]);});
  const inN=new Set([1]);const tree=new Set();
  const mkPanel=()=>{
    const cand=edges.filter(e=>inN.has(e[0])!==inN.has(e[1])).sort((a,b)=>a[2]-b[2]);
    const rows=cand.map(e=>`<div class="srow ${inN.has(e[0])&&inN.has(e[1])?'done':''}">${e[0]}–${e[1]}<span>${e[2]}</span></div>`).join('')||'<div class="srow done">Boşdur ✓</div>';
    return `<div class="slbl">Ağacdakı təpələr</div><div class="srow done">${[...inN].join(', ')} <span>${inN.size}/5</span></div><div class="slbl">Frontier kənarları</div>${rows}`;
  };
  S.push({tree:new Set(),consider:null,reject:false,inNodes:new Set(inN),cur:null,dist:null,codeLine:[2,3,4,5,6,7,8,9],
    title:'Başlanğıc / Start',
    desc:`<b>Kod:</b> <code>visited[1] = True; heap = frontier edges</code><br>Başlanğıc: <b>1</b> təpəsindən başlayırıq. Heap-ə 1-dən çıxan bütün kənarlar əlavə olunur.<br><small style="color:var(--muted)">Prim: start at node 1, greedily pick minimum-weight frontier edge each step.</small>`,panel:mkPanel()});
  while(inN.size<5){
    const cand=edges.filter(e=>inN.has(e[0])!==inN.has(e[1])).sort((a,b)=>a[2]-b[2]);
    if(!cand.length)break;
    const pick=cand[0];const nv=inN.has(pick[0])?pick[1]:pick[0];
    inN.add(nv);tree.add(ek(pick[0],pick[1]));
    S.push({tree:new Set(tree),consider:ek(pick[0],pick[1]),reject:false,inNodes:new Set(inN),cur:nv,dist:null,codeLine:[10,11,12,13,14,15,16,17],
      title:`Seçildi: ${pick[0]}–${pick[1]} (çəki ${pick[2]})`,
      desc:`<b>Kod:</b> <code>w, u, v = heappop(heap)  # ${pick[2]}, ${pick[0]}, ${pick[1]}</code><br>Frontier kənarlardan ən kiçiyi: <b style="color:var(--teal)">${pick[0]}–${pick[1]}</b> (çəki <b style="color:var(--teal)">${pick[2]}</b>)<br>Təpə <b style="color:var(--amber)">${nv}</b> MST-ə əlavə edildi. visited[${nv}] = True<br><small style="color:var(--muted)">New frontier edges from ${nv} added to heap.</small>`,panel:mkPanel()});
  }
  const total=[...tree].reduce((s,k)=>{const e=edges.find(e=>ek(e[0],e[1])===k);return s+(e?e[2]:0);},0);
  S.push({tree:new Set(tree),consider:null,reject:false,inNodes:new Set(inN),cur:null,dist:null,codeLine:18,
    title:'MST hazırdır ✓ / MST complete',
    desc:`<b>Kod:</b> <code>return mst, total</code><br>Bütün 5 təpə birləşdi. MST ağırlığı: <b style="color:var(--teal)">${total}</b><br>Kənarlar: <b>${[...tree].join(', ')}</b>`,panel:mkPanel()});
  return S;
}

function kruskalSteps(edges){
  const S=[];
  const sorted=[...edges].sort((a,b)=>a[2]-b[2]);
  const status={};sorted.forEach(e=>status[ek(e[0],e[1])]='wait');
  const par={};for(let i=1;i<=5;i++)par[i]=i;
  const find=x=>{while(par[x]!==x){par[x]=par[par[x]];x=par[x];}return x;};
  const tree=new Set();const inN=new Set();let total=0;
  const mkPanel=()=>{
    const map={wait:'',ok:'done',rej:'rej'};
    const lab={wait:'gözləyir',ok:'qəbul',rej:'rədd'};
    return `<div class="slbl">Sıralanmış kənarlar</div>${sorted.map(e=>{const k=ek(e[0],e[1]);return `<div class="srow ${map[status[k]]}">${e[0]}–${e[1]} (${e[2]}) <span class="sbadge">${lab[status[k]]}</span></div>`;}).join('')}`;
  };
  S.push({tree:new Set(),consider:null,reject:false,inNodes:new Set(),cur:null,dist:null,codeLine:[6,7,8,9],
    title:'Başlanğıc / Start',
    desc:`<b>Kod:</b> <code>for w, u, v in sorted(edges):</code><br>Bütün kənarlar çəkiyə görə artan sıraya düzüldü:<br><b>[${sorted.map(e=>`${e[0]}-${e[1]}(${e[2]})`).join(' | ')}]</b><br><small style="color:var(--muted)">Kruskal: process edges by weight; accept if no cycle (Union-Find).</small>`,panel:mkPanel()});
  for(const e of sorted){
    const k=ek(e[0],e[1]);const ru=find(e[0]),rv=find(e[1]);
    if(ru!==rv){
      par[ru]=rv;tree.add(k);total+=e[2];status[k]='ok';inN.add(e[0]);inN.add(e[1]);
      S.push({tree:new Set(tree),consider:k,reject:false,inNodes:new Set(inN),cur:null,dist:null,codeLine:[10,11,12,13],
        title:`✓ Qəbul: ${e[0]}–${e[1]} (çəki ${e[2]})`,
        desc:`<b>Kod:</b> <code>ru=${ru}, rv=${rv} → ru ≠ rv</code><br>Təpələr <b>${e[0]}</b> (kök: ${ru}) və <b>${e[1]}</b> (kök: ${rv}) <b>fərqli komponentdədir</b>.<br>Dövrə yaranmır → kənar <b style="color:var(--teal)">${e[0]}–${e[1]}</b> MST-ə əlavə edildi.<br>parent[${ru}] = ${rv}. Cəm: ${total}`,panel:mkPanel()});
    }else{
      status[k]='rej';
      S.push({tree:new Set(tree),consider:k,reject:true,inNodes:new Set(inN),cur:null,dist:null,codeLine:[10,11],
        title:`✕ Rədd: ${e[0]}–${e[1]} (çəki ${e[2]})`,
        desc:`<b>Kod:</b> <code>ru=${ru}, rv=${rv} → ru == rv</code><br>Təpələr <b>${e[0]}</b> və <b>${e[1]}</b> <b>eyni komponentdədir</b> (kök: ${ru}).<br>Bu kənar <b style="color:var(--red)">dövrə (cycle) yaradır</b> → rədd edilir.`,panel:mkPanel()});
    }
    if(tree.size===4)break;
  }
  S.push({tree:new Set(tree),consider:null,reject:false,inNodes:new Set(inN),cur:null,dist:null,codeLine:14,
    title:'MST hazırdır ✓ / MST complete',
    desc:`<b>Kod:</b> <code>return mst, total</code><br>4 kənar seçildi, MST hazırdır.<br>Ümumi çəki: <b style="color:var(--teal)">${total}</b>`,panel:mkPanel()});
  return S;
}

function dijkstraSteps(edges){
  const S=[];
  const adj={};for(let i=1;i<=5;i++)adj[i]=[];
  edges.forEach(e=>{adj[e[0]].push([e[1],e[2]]);adj[e[1]].push([e[0],e[2]]);});
  const dist={};for(let i=1;i<=5;i++)dist[i]=Infinity;dist[1]=0;
  const visited=new Set();const prev={};const treeK=new Set();
  const mkPanel=(cur)=>{
    const rows=[1,2,3,4,5].map(n=>{const cls=n===cur?'cur':(visited.has(n)?'done':'');
      const d=dist[n]===Infinity?'∞':dist[n];
      return `<tr class="${cls}"><td>${n}</td><td>${d}</td><td>${prev[n]||'—'}</td></tr>`;}).join('');
    return `<div class="slbl">Məsafə cədvəli</div><table class="dtbl"><thead><tr><th>Təpə</th><th>dist</th><th>əvv.</th></tr></thead><tbody>${rows}</tbody></table>`;
  };
  S.push({tree:new Set(),consider:null,reject:false,inNodes:new Set(),cur:null,dist:{...dist},codeLine:[2,3,4,5],
    title:'Başlanğıc / Start',
    desc:`<b>Kod:</b> <code>dist[1]=0, dist[diğərləri]=∞</code><br>Mənbə: <b>1</b>. dist[1]=0, bütün qalanlar ∞.<br>Hər addımda yekunlaşmamış ən qısa dist-li təpə seçilir (greedy).<br><small style="color:var(--muted)">Dijkstra: always process minimum-distance unvisited vertex → relaxes its neighbors.</small>`,panel:mkPanel(null)});
  while(visited.size<5){
    let u=null,best=Infinity;
    for(let i=1;i<=5;i++)if(!visited.has(i)&&dist[i]<best){best=dist[i];u=i;}
    if(u===null)break;
    visited.add(u);if(prev[u])treeK.add(ek(prev[u],u));
    const updates=[];
    for(const[v,w]of adj[u]){
      if(visited.has(v))continue;
      if(dist[u]+w<dist[v]){dist[v]=dist[u]+w;prev[v]=u;updates.push(`dist[${v}]: ${dist[v]+w>dist[v]?'∞':dist[v]+w}→${dist[v]}`);}
    }
    S.push({tree:new Set(treeK),consider:null,reject:false,inNodes:new Set(visited),cur:u,dist:{...dist},codeLine:[6,7,8,9,10,11,12],
      title:`Seçildi: Təpə ${u} (dist=${best})`,
      desc:`<b>Kod:</b> <code>d, u = heappop(heap)  # dist=${best}, u=${u}</code><br>Yekunlaşmamışlar arasında ən qısa: <b style="color:var(--amber)">Təpə ${u}</b> (dist=<b style="color:var(--amber)">${best}</b>)<br>${updates.length?`<b>Relaxation:</b> ${updates.map(s=>`<span style="color:var(--teal)">${s}</span>`).join(', ')}`:'Qonşular üçün yeniləmə yoxdur (all already shorter)'}<br><small style="color:var(--muted)">visited.add(${u})</small>`,panel:mkPanel(u)});
  }
  S.push({tree:new Set(treeK),consider:null,reject:false,inNodes:new Set(visited),cur:null,dist:{...dist},codeLine:13,
    title:'Deykstra tamamlandı ✓ / Done',
    desc:`<b>Kod:</b> <code>return dist</code><br>Bütün ən qısa yollar tapıldı:<br>${[1,2,3,4,5].map(i=>`<b>d[${i}]</b>=<span style="color:var(--teal)">${dist[i]===Infinity?'∞':dist[i]}</span>`).join(' · ')}`,panel:mkPanel(null)});
  return S;
}

// =====================================================================
// COMPARE MODE
// =====================================================================
function compareSteps(arr,alg1,alg2,metric){
  const genFn={bubble:bubbleSteps,insertion:insertionSteps,selection:selectionSteps};
  const s1=genFn[alg1]([...arr]);const s2=genFn[alg2]([...arr]);
  const combined=[];const maxLen=Math.max(s1.length,s2.length);
  for(let i=0;i<maxLen;i++){
    combined.push({
      type:'compare',
      s1:s1[Math.min(i,s1.length-1)],
      s2:s2[Math.min(i,s2.length-1)],
      metric, alg1, alg2,
      prog1:Math.min(i,s1.length-1),prog2:Math.min(i,s2.length-1),
      total1:s1.length,total2:s2.length
    });
  }
  return combined;
}

  {title:'Big-O nəticə',code:`T(n) = n·log n`,math:'Big-O → <span class="res">O(n log n)</span>',result:'O(n log n)',rdesc:'İkiyə bölünən xarici dövr × n daxili dövr → n log n.'}
],
cx41:[
  {title:'Kod strukturu',code:`i = 2\nwhile (i < n) {\n  i = <span class="hl">i * i</span>   ← kvadratlanır!\n  x = x+1\n}`,math:'i: 2 → 4 → 16 → 256 → ...',desc:'i hər addımda kvadratlanır. Bu çox sürətli artır!'},
  {title:'Nə vaxt dayanır?',code:`Addım 0: i = 2 = 2^1\nAddım 1: i = 4 = 2^2\nAddım 2: i = 16 = 2^4\nAddım k: i = 2^(2^k)`,math:'Şərt: 2^(2^k) >= n → 2^k >= log₂(n) → k >= log₂(log₂(n))',desc:'k addımdan sonra i≥n olur.'},
  {title:'Big-O nəticə',code:`T(n) = log(log(n))`,math:'Big-O → <span class="res">O(log log n)</span>',result:'O(log log n)',rdesc:'Kvadratlama çox sürətli böyüyür — log log n addım kifayətdir.'}
]
};

function barClass(i,step){
  const sp=step.sp||{};
  if(sp.pivot===i) return 'pivot';
  if(sp.key===i)   return 'keyv';
  if(sp.min===i)   return 'minv';
  if(sp.placed===i)return 'placed';
  if(step.cmp&&step.cmp.includes(i)) return sp.swp?'swp':'cmp';
  if(step.sorted&&step.sorted.has(i)) return 'sorted';
  if(sp.lrange&&i>=sp.lrange[0]&&i<=sp.lrange[1]) return 'lhalf';
  if(sp.rrange&&i>=sp.rrange[0]&&i<=sp.rrange[1]) return 'rhalf';
  return '';
}

function renderBars(container,step){
  const arr=step.arr;const n=arr.length;
  const maxV=Math.max(...arr)||1;
  let html='<div class="bar-group">';
  for(let i=0;i<n;i++){
    const h=Math.round((arr[i]/maxV)*185)+10;
    const extra=barClass(i,step);
    html+=`<div class="bar-col">
      <div class="bar-val">${arr[i]}</div>
      <div class="bar-rect${extra?' '+extra:''}" style="height:${h}px"></div>
      <div class="bar-idx">${i}</div>
    </div>`;
  }
  html+='</div>';
  // legend
  const algo=curProb&&curProb.algo;
  const legends=[];
  if(algo==='bubble'||algo==='quick'||algo==='selection'||algo==='insertion'||algo==='shell'||algo==='merge'){
    legends.push(['cmp','Müqayisə / Comparing']);
    legends.push(['sorted','Sıralanmış / Sorted']);
  }
  if(algo==='quick') legends.push(['pivot','Pivot']);
  if(algo==='insertion'||algo==='shell') legends.push(['keyv','Açar (Key)']);
  if(algo==='selection') legends.push(['minv','Minimum']);
  if(algo==='merge'){legends.push(['lhalf','Sol yarı / Left']);legends.push(['rhalf','Sağ yarı / Right']);legends.push(['placed','Yerləşdirildi / Placed']);}
  if(legends.length){
    html+=`<div class="bar-legend">${legends.map(([c,l])=>`<span class="leg-item"><span class="leg-dot ${c}"></span>${l}</span>`).join('')}</div>`;
  }
  container.innerHTML=html;
}

function renderCompare(container,step){
  const s1=step.s1,s2=step.s2;
  const metric=step.metric;
  const v1=metric==='ops'?s1.ops:s1.swaps;
  const v2=metric==='ops'?s2.ops:s2.swaps;
  const lbl={bubble:'Qabarcıq',insertion:'Yerinəqoyma',selection:'Seçim'};
  const metricLbl=metric==='ops'?'müqayisə':'yerdəyişmə';
  container.innerHTML=`<div class="cmp-wrap">
    <div class="cmp-side"><div class="cmp-label">${lbl[step.alg1]}</div>${getBarsHTML(s1)}<div class="cmp-stats"><span class="cmp-stat ${v1<=v2?'better':''}">${metricLbl}: ${v1}</span></div></div>
    <div class="cmp-side"><div class="cmp-label">${lbl[step.alg2]}</div>${getBarsHTML(s2)}<div class="cmp-stats"><span class="cmp-stat ${v2<=v1?'better':''}">${metricLbl}: ${v2}</span></div></div>
  </div>`;
}

function getBarsHTML(step){
  const arr=step.arr;const n=arr.length;const maxV=Math.max(...arr)||1;
  let html='<div class="bar-group" style="height:160px;padding:8px 6px 4px">';
  for(let i=0;i<n;i++){
    const h=Math.round((arr[i]/maxV)*140)+8;
    let cls='bar-rect';
    if(step.cmp&&step.cmp.includes(i))cls+=' cmp';
    else if(step.sorted&&step.sorted.has(i))cls+=' sorted';
    else if(step.sp&&step.sp.min===i)cls+=' minv';
    html+=`<div class="bar-col" style="max-width:48px"><div class="bar-val" style="font-size:9.5px">${arr[i]}</div><div class="${cls}" style="height:${h}px;width:100%"></div></div>`;
  }
  return html+'</div>';
}

function renderComplexity(container,mergeInfoEl,steps,idx){
  const s=steps[idx];
  let html='<div class="cx-view">';
  // code
  html+=`<div class="slbl">Kod</div><div class="cx-code">${s.code}</div>`;
  // math derivation for all steps so far
  html+=`<div class="slbl">Analiz — Addım ${idx+1}/${steps.length}</div><div class="cx-math">${s.math}</div>`;
  html+=`<p style="font-size:13.5px;color:var(--muted);padding:0 0 10px">${s.desc}</p>`;
  if(s.result){
    html+=`<div class="cx-result"><div class="big">${s.result}</div><div class="sub">${s.rdesc}</div></div>`;
  }
  html+='</div>';
  container.innerHTML=html;
  if(mergeInfoEl)mergeInfoEl.style.display='none';
}

let curProb=null,steps=[],idx=0,timer=null,curStep=null;
const $=id=>document.getElementById(id);

        ${gc('Kruskal', cur==='kruskal'?'cur2':'', 'MST', 'mst',
          'Bütün tepələri <b>ən ucuz kənarla</b> bir-birinə birləşdir (ümumi kabel xərcini azalt)',
          'Hər addımda soruşur: "Bu tək kənara nə qədər başa gəlir?"')}
        ${gc('Deykstra', cur==='dijkstra'?'dif':'', 'Ən qısa yol', 'sp',
          '<b>A-dan</b> hər tepəyə ümumi məsafəni tap (neçə addım yol getmək lazımdır?)',

      return `<span class="code-line${isActive?' active-line':''}" data-ln="${i}"><span class="ln">${i+1}</span><span class="lc">${escaped}</span></span>`;

function renderStep(){
  if(!steps.length)return;
  const s=steps[idx];
  curStep=s;
  if(window._renderCode&&s.codeLine!==undefined)window._renderCode(window._getActiveLang?window._getActiveLang():'py',s.codeLine);
  const va=$('viz-area');
  const mi=$('merge-info');
  mi.style.display='none';
  if(curProb.type==='sort'){
    renderBars(va,s);
    if(s.mergeInfo!==undefined&&s.mergeInfo){mi.style.display='block';mi.textContent=s.mergeInfo;}
    $('desc-panel').innerHTML=`<span class="step-title">${s.title}</span><div style="margin-top:6px;line-height:1.6;font-size:13px">${s.desc}</div>`;
    // State panel for sort
    let sp='';
    if(s.ops!==undefined){
      const swapLabel=curProb.algo==='insertion'||curProb.algo==='shell'?'Sürüş / Shifts':'Swap / Yerdəyişmə';
      sp+=`<div class="slbl">Statistika / Statistics</div>`;
      sp+=`<div class="srow"><span>Müqayisə / Comparisons</span><span style="color:var(--amber)">${s.ops}</span></div>`;
      if(s.swaps!==undefined)sp+=`<div class="srow"><span>${swapLabel}</span><span style="color:var(--teal)">${s.swaps}</span></div>`;
    }
    if(s.gap!==undefined&&s.gap!==null)sp+=`<div class="slbl">Cari Boşluq / Current Gap</div><div class="srow pick"><span>gap</span><span>${s.gap}</span></div>`;
    if(s.arr){
      const highlighted=s.arr.map((v,i)=>{
        const cls=barClass(i,s);
        const c=cls==='cmp'||cls==='swp'?'var(--amber)':cls==='sorted'?'var(--teal)':cls==='pivot'?'var(--purple)':cls==='keyv'||cls==='placed'?'var(--blue)':cls==='minv'?'var(--red)':'var(--muted)';
        return `<span style="color:${c};font-weight:${cls?'700':'400'}">${v}</span>`;
      }).join('<span style="color:#3d4f63"> · </span>');
      sp+=`<div class="slbl">Massiv / Array</div><div class="srow" style="flex-wrap:wrap;gap:2px;font-size:12px">${highlighted}</div>`;
    }
    $('state-panel').innerHTML=sp;
  } else if(curProb.type==='graph'){
    buildGraphSVG(va,curProb.edges,s);
    $('desc-panel').innerHTML=`<span class="step-title">${s.title}</span>${s.desc}`;
    $('state-panel').innerHTML=s.panel||'';
  } else if(curProb.type==='compare'){
    renderCompare(va,s);
    const lbl={bubble:'Qabarcıq',insertion:'Yerinəqoyma',selection:'Seçim'};
    const metric=s.metric==='ops'?'müqayisə':'yerdəyişmə';
    const v1=s.metric==='ops'?s.s1.ops:s.s1.swaps;
    const v2=s.metric==='ops'?s.s2.ops:s.s2.swaps;
    $('desc-panel').innerHTML=`<span class="step-title">Müqayisə mərhələsi</span><b>${lbl[s.alg1]}</b>: ${metric} sayı <b>${v1}</b> · <b>${lbl[s.alg2]}</b>: ${metric} sayı <b>${v2}</b><br><br>${s.s1.title}`;
    const winner=v1<v2?lbl[s.alg1]:v2<v1?lbl[s.alg2]:'Bərabər';
    $('state-panel').innerHTML=`<div class="slbl">Cari ${metric} sayı</div><div class="srow ${v1<=v2?'done':''}">${lbl[s.alg1]}<span>${v1}</span></div><div class="srow ${v2<=v1?'done':''}">${lbl[s.alg2]}<span>${v2}</span></div><div class="slbl">Üstünlük</div><div class="srow pick"><span>${winner}</span></div>`;
  } else if(curProb.type==='complexity'){
    renderComplexity(va,mi,steps,idx);
    $('desc-panel').innerHTML=`<span class="step-title">Addım ${idx+1}/${steps.length}</span>${s.desc}`;
    $('state-panel').innerHTML=`<div class="slbl">Analiz İrəliləyişi</div>${steps.map((st,i)=>`<div class="srow ${i<idx?'done':i===idx?'pick':''}">${i+1}. ${st.title}</div>`).join('')}`;
  }
  // Controls
  $('prog').style.width=(steps.length<=1?100:idx/(steps.length-1)*100)+'%';
  $('step-ctr').textContent=`${idx+1} / ${steps.length}`;
  $('btn-prev').disabled=idx===0;
  $('btn-next').disabled=idx===steps.length-1;
}

function go(d){idx=Math.max(0,Math.min(steps.length-1,idx+d));renderStep();if(idx===steps.length-1)stopPlay();}
function stopPlay(){if(timer){clearInterval(timer);timer=null;$('btn-play').textContent='▶ Avtomatik';}}

$('btn-next').onclick=()=>go(1);
$('btn-prev').onclick=()=>go(-1);
$('btn-reset').onclick=()=>{idx=0;stopPlay();renderStep();};
$('btn-play').onclick=()=>{
  if(timer){stopPlay();}
  else{if(idx===steps.length-1)idx=0;$('btn-play').textContent='⏸ Dayandır';
    timer=setInterval(()=>{if(idx>=steps.length-1){stopPlay();}else go(1);},900);}
};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='.'){e.preventDefault();go(1);}
  if(e.key==='ArrowLeft'||e.key===','){e.preventDefault();go(-1);}
  if(e.key===' '){e.preventDefault();$('btn-play').click();}
});

const CAT_COLORS={Sıralama:'var(--teal)',Qraf:'var(--amber)',Müqayisə:'var(--blue)',Mürəkkəblik:'var(--purple)'};
function buildSidebar(){
  const pl=$('prob-list');
  const cats=[...new Set(PROBLEMS.map(p=>p.cat))];
  cats.forEach(cat=>{
    const div=document.createElement('div');
    div.innerHTML=`<div class="sb-cat" style="color:${CAT_COLORS[cat]||'var(--muted)'}">${cat}</div>`;
    PROBLEMS.filter(p=>p.cat===cat).forEach(prob=>{
      const item=document.createElement('div');
      item.className='sb-item';item.dataset.id=prob.id;
      const shortTitle=prob.title.replace(' (Məsələ '+prob.id+')','').replace('Alqoritmi','').replace('Sort','').replace('Sıralama','Sır.').replace('Asimptotik Analiz','Mür.').trim();
      item.innerHTML=`<div class="sb-num">${prob.id}</div><div class="sb-txt">${shortTitle}</div>`;
      item.onclick=()=>loadProblem(prob);
      div.appendChild(item);
    });
    pl.appendChild(div);
  });
}
function updateSidebar(id){
  document.querySelectorAll('.sb-item').forEach(el=>{
    el.classList.toggle('active',parseInt(el.dataset.id)===id);
  });
}

// =====================================================================
// MOBILE SIDEBAR
// =====================================================================
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const ov=document.getElementById('sidebar-overlay');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
}
// Close sidebar when problem selected on mobile
document.getElementById('prob-list').addEventListener('click',()=>{
  if(window.innerWidth<=720){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  }
});

// =====================================================================
// INIT
// =====================================================================
buildSidebar();
loadProblem(PROBLEMS[0]);
</script>
